<!DOCTYPE html>
<html>
<head>
  <title>Student Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h2>Student Panel</h2>

  <!-- OPTIONS -->
  <button onclick="showStatus()">Check Status</button>
  <button onclick="showRegister()">Register Complaint</button>

  <hr>

  <!-- CHECK STATUS -->
  <div id="statusSection" style="display:none;">
    <h3>Check Status</h3>

    <button onclick="filterStatus('all')">All</button>
    <button onclick="filterStatus('Pending')">Pending</button>
    <button onclick="filterStatus('In Progress')">In Progress</button>
    <button onclick="filterStatus('Resolved')">Resolved</button>

    <div id="statusList"></div>
  </div>

  <!-- REGISTER -->
  <div id="registerSection" style="display:none;">
    <h3>Select Department</h3>

    <button onclick="selectDept('hostel')">Hostel/Mess</button>
    <button onclick="selectDept('academics')">Academics</button>
    <button onclick="selectDept('campus')">Campus Infrastructure</button>

    <h3>Existing Complaints (Vote)</h3>
    <div id="pollList"></div>

    <button onclick="voteComplaint()">Vote</button>

    <hr>

    <h3>Add New Complaint</h3>

    <input id="title" placeholder="Title"><br><br>
    <textarea id="description" placeholder="Description"></textarea><br><br>

    <button onclick="submitComplaint()">Submit</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="student.js"></script>

</body>
</html>
